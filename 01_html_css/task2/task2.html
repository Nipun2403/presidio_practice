<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Linking external CSS file -->
  <link rel="stylesheet" href="task2.css">

  <title>Task 1</title>
</head>

<body>
  <header>
    <!-- Navbar containing navigation links -->
    <nav id="nav">
      <p id="brand_name">SpotiFav</p>
      <a class="nav_links" href="#">Home</a>
      <a class="nav_links" href="#">Search</a>
      <a class="nav_links" href="#">Library</a>
    </nav>
  </header>

  <section class="main_section">
    <h1>Welcome to SpotiFav</h1>
    <!-- Mobile section only visibile when viewing on a mobile device -->
    <h2 class="mobile_preview">This is Mobile Preview</h2>
    <h2 class="desktop_preview">This is a Large Screen Preview Text</h2>
    <p>Your favorite music, all in one place.</p>
    <button class="cta_button">Get Started</button>
  </section>

  <section>
    <!-- Div for card -->
    <div class="card">
      <img src="https://i.scdn.co/image/ab67616d0000b273d8de8d8148b7850cdb5c3e5c" alt="Album Cover" class="album_cover">
      <h2 class="card_title">The Color Voilet</h2>
      <p class="card_desc">Artist: Tory Lanez</p>
    </div>
  </section>
  <footer class="footer">
    <p>&copy; 2024 SpotiFav. All rights reserved.</p>
  </footer>
